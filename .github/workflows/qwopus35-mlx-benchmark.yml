name: Evaluate Qwopus and Qwen on Qwopus datasets

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: qwopus-qwen-dataset-eval
  cancel-in-progress: false

jobs:
  dataset-eval:
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm mlx-vlm huggingface_hub datasets pandas pyarrow psutil

      - name: Evaluate models on sampled dataset questions
        shell: bash
        run: |
          set +e
          cat > eval_qwopus_qwen_datasets.py <<'PY'
          import csv, gc, inspect, json, os, re, statistics, subprocess, sys, time, traceback
          from pathlib import Path
          import psutil
          import pandas as pd
          from datasets import load_dataset, Dataset
          from huggingface_hub import HfApi

          DATASETS = [
              {
                  'id': 'nohurry/Opus-4.6-Reasoning-3000x-filtered',
                  'url': 'https://huggingface.co/datasets/nohurry/Opus-4.6-Reasoning-3000x-filtered',
                  'kind': 'ds1',
              },
              {
                  'id': 'Jackrong/Qwen3.5-reasoning-700x',
                  'url': 'https://huggingface.co/datasets/Jackrong/Qwen3.5-reasoning-700x',
                  'kind': 'ds2',
              },
              {
                  'id': 'Roman1111111/claude-opus-4.6-10000x',
                  'url': 'https://huggingface.co/datasets/Roman1111111/claude-opus-4.6-10000x',
                  'kind': 'ds3',
              },
          ]
          MODELS = [
              {'label': 'qwopus', 'id': 'Jackrong/MLX-Qwopus3.5-9B-v3-4bit', 'backend': 'mlx_lm'},
              {'label': 'qwen', 'id': 'mlx-community/Qwen3.5-9B-4bit', 'backend': 'auto'},
          ]
          SAMPLE_PER_DATASET = 1
          MAX_NEW_TOKENS = 64
          SEED = 12181531

          OUT_MD = Path('qwopus-qwen-dataset-eval-results.md')
          OUT_JSON = Path('qwopus-qwen-dataset-eval-results.json')
          OUT_CSV = Path('qwopus-qwen-dataset-eval-results.csv')
          LOG = Path('qwopus-qwen-dataset-eval.log')

          def log(msg):
              text = str(msg)
              print(text, flush=True)
              with LOG.open('a', encoding='utf-8') as f:
                  f.write(text + '\n')

          def sh(args):
              try:
                  return subprocess.check_output(args, text=True, stderr=subprocess.STDOUT).strip()
              except Exception as e:
                  return f'unavailable: {e}'

          def norm_text(x):
              return re.sub(r'\s+', ' ', str(x or '')).strip()

          def normalize_for_score(x):
              x = norm_text(x).lower()
              x = re.sub(r'<think>.*?</think>', ' ', x, flags=re.S)
              x = re.sub(r'[^a-z0-9\.\-]+', ' ', x)
              return re.sub(r'\s+', ' ', x).strip()

          def token_f1(pred, ref):
              p = normalize_for_score(pred).split()
              r = normalize_for_score(ref).split()
              if not p or not r:
                  return 0.0
              common = {}
              for t in r:
                  common[t] = common.get(t, 0) + 1
              overlap = 0
              for t in p:
                  if common.get(t, 0) > 0:
                      overlap += 1
                      common[t] -= 1
              if overlap == 0:
                  return 0.0
              precision = overlap / len(p)
              recall = overlap / len(r)
              return round(2 * precision * recall / (precision + recall), 4)

          def contains_answer(pred, ref):
              p = normalize_for_score(pred)
              r = normalize_for_score(ref)
              if not p or not r:
                  return False
              # Use final short line / answer-ish suffix if available.
              tail = r[-200:]
              nums = re.findall(r'-?\d+(?:\.\d+)?', tail)
              if nums:
                  return any(n in p for n in nums[-3:])
              words = [w for w in tail.split() if len(w) > 3]
              if not words:
                  return False
              return sum(1 for w in words[:20] if w in p) >= max(1, min(3, len(words[:20]) // 3))

          def load_ds3_parquet():
              path = 'hf://datasets/Roman1111111/claude-opus-4.6-10000x@refs/convert/parquet/default/train/0000.parquet'
              return Dataset.from_pandas(pd.read_parquet(path), preserve_index=False)

          def load_any_dataset(dataset_id):
              try:
                  return load_dataset(dataset_id, split='train')
              except Exception as e:
                  if dataset_id == 'Roman1111111/claude-opus-4.6-10000x':
                      log('Using parquet fallback for ds3 after load_dataset error: ' + repr(e))
                      return load_ds3_parquet()
                  raise

          def parse_message_item(m):
              if isinstance(m, dict):
                  return m
              if isinstance(m, str):
                  try:
                      obj = json.loads(m)
                      return obj if isinstance(obj, dict) else None
                  except Exception:
                      return None
              return None

          def ds1_to_qa(row):
              q = norm_text(row.get('problem'))
              ref = norm_text(row.get('solution'))
              if not ref:
                  ref = norm_text(row.get('thinking'))
              return q, ref

          def ds2_to_qa(row):
              conv = row.get('conversation') or []
              user = None
              assistant = None
              for m in conv:
                  if not isinstance(m, dict):
                      continue
                  role = (m.get('from') or '').strip()
                  val = norm_text(m.get('value'))
                  if role == 'human':
                      user = val
                  elif role == 'gpt' and user:
                      assistant = val
              return user, assistant

          def ds3_to_qa(row):
              raw = row.get('messages') or []
              msgs = []
              for m in raw:
                  pm = parse_message_item(m)
                  if pm:
                      msgs.append(pm)
              user = None
              assistant = None
              for m in msgs:
                  role = m.get('role')
                  content = norm_text(m.get('content'))
                  reasoning = norm_text(m.get('reasoning'))
                  if role == 'user':
                      user = content
                  elif role == 'assistant' and user:
                      assistant = (('<think>' + reasoning + '</think>\n') if reasoning else '') + content
              return user, assistant

          def build_samples():
              samples = []
              for spec in DATASETS:
                  ds = load_any_dataset(spec['id'])
                  ds = ds.shuffle(seed=SEED)
                  added = 0
                  for row in ds:
                      if spec['kind'] == 'ds1':
                          q, ref = ds1_to_qa(row)
                      elif spec['kind'] == 'ds2':
                          q, ref = ds2_to_qa(row)
                      else:
                          q, ref = ds3_to_qa(row)
                      if q and ref and len(q) < 4000:
                          samples.append({
                              'dataset_id': spec['id'],
                              'dataset_url': spec['url'],
                              'question': q,
                              'reference': ref,
                          })
                          added += 1
                      if added >= SAMPLE_PER_DATASET:
                          break
              return samples

          def save(result):
              result['updated_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              OUT_JSON.write_text(json.dumps(result, indent=2) + '\n', encoding='utf-8')
              cols = ['model_label','model_id','dataset_id','status','elapsed_seconds','token_f1','contains_answer','question','reference','prediction','error']
              with OUT_CSV.open('w', encoding='utf-8', newline='') as f:
                  w = csv.DictWriter(f, fieldnames=cols)
                  w.writeheader()
                  for r in result.get('evaluations', []):
                      w.writerow({c: r.get(c, '') for c in cols})
              lines = [
                  '# Qwopus vs Qwen dataset evaluation', '',
                  f"Status: `{result.get('status')}`",
                  f"Started: `{result.get('started_at')}`",
                  f"Updated: `{result.get('updated_at')}`",
                  f"Runner: `{result.get('runner')} {result.get('runner_os')} {result.get('runner_arch')}`",
                  f"Platform: `{result.get('platform')}`", '',
                  '## Dataset URLs',
              ]
              for d in DATASETS:
                  lines.append(f"- `{d['id']}`: {d['url']}")
              lines += ['', '## Model summary', '| Model | Status | Avg token-F1 | Contains-answer rate | Cases |', '|---|---|---:|---:|---:|']
              for m in result.get('models', []):
                  lines.append(f"| {m.get('label')} `{m.get('id')}` | {m.get('status')} | {m.get('avg_token_f1')} | {m.get('contains_answer_rate')} | {m.get('cases')} |")
              lines += ['', '## Case results', '| Model | Dataset | Status | Seconds | token-F1 | Contains answer |', '|---|---|---|---:|---:|---:|']
              for r in result.get('evaluations', []):
                  lines.append(f"| {r.get('model_label')} | `{r.get('dataset_id')}` | {r.get('status')} | {r.get('elapsed_seconds')} | {r.get('token_f1')} | {r.get('contains_answer')} |")
              if result.get('notes'):
                  lines += ['', '## Notes'] + [f"- {n}" for n in result['notes']]
              OUT_MD.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          def load_mlx_lm_model(model_id):
              import mlx.core as mx
              from mlx_lm import generate, load
              kwargs = {}
              try:
                  if 'tokenizer_config' in inspect.signature(load).parameters:
                      kwargs['tokenizer_config'] = {'fix_mistral_regex': True}
              except Exception:
                  pass
              model, tokenizer = load(model_id, **kwargs)
              mx.eval(model.parameters())
              def gen(prompt, max_tokens):
                  return generate(model, tokenizer, prompt=prompt, max_tokens=max_tokens, verbose=False)
              return gen

          def load_mlx_vlm_model(model_id):
              from mlx_vlm import load, generate
              from mlx_vlm.prompt_utils import apply_chat_template
              from mlx_vlm.utils import load_config
              model, processor = load(model_id)
              config = load_config(model_id)
              def gen(prompt, max_tokens):
                  formatted = apply_chat_template(processor, config, prompt, num_images=0)
                  try:
                      return generate(model, processor, formatted, image=[], max_tokens=max_tokens)
                  except TypeError:
                      return generate(model, processor, formatted, [], max_tokens=max_tokens)
              return gen

          def load_generator(model_spec):
              errors = []
              try:
                  return load_mlx_lm_model(model_spec['id']), 'mlx_lm', errors
              except Exception as e:
                  errors.append({'backend': 'mlx_lm', 'error': repr(e)})
              try:
                  return load_mlx_vlm_model(model_spec['id']), 'mlx_vlm', errors
              except Exception as e:
                  errors.append({'backend': 'mlx_vlm', 'error': repr(e)})
              raise RuntimeError(json.dumps(errors))

          for p in (OUT_MD, OUT_JSON, OUT_CSV, LOG):
              p.write_text('', encoding='utf-8')

          result = {
              'status': 'started',
              'started_at': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'github_sha': os.environ.get('GITHUB_SHA'),
              'github_run_id': os.environ.get('GITHUB_RUN_ID'),
              'runner': os.environ.get('RUNNER_NAME'),
              'runner_os': os.environ.get('RUNNER_OS'),
              'runner_arch': os.environ.get('RUNNER_ARCH'),
              'platform': platform.platform(),
              'python_version': sys.version.replace('\n', ' '),
              'macos_version': sh(['sw_vers']),
              'dataset_urls': {d['id']: d['url'] for d in DATASETS},
              'models': [],
              'samples': [],
              'evaluations': [],
              'notes': ['Scores are lightweight lexical checks against reference answers, not a full human/LLM judge.'],
          }
          save(result)

          try:
              samples = build_samples()
              result['samples'] = samples
              save(result)
              for model_spec in MODELS:
                  msum = {'label': model_spec['label'], 'id': model_spec['id'], 'status': 'started'}
                  result['models'].append(msum)
                  save(result)
                  try:
                      log('Loading model ' + model_spec['label'] + ': ' + model_spec['id'])
                      gen, backend, load_errors = load_generator(model_spec)
                      msum['backend'] = backend
                      msum['load_errors_before_success'] = load_errors
                      msum['status'] = 'loaded'
                      save(result)
                      scores = []
                      hits = []
                      for sample in samples:
                          prompt = 'Answer the following question. Keep the final answer concise.\n\n' + sample['question']
                          row = {
                              'model_label': model_spec['label'],
                              'model_id': model_spec['id'],
                              'dataset_id': sample['dataset_id'],
                              'question': sample['question'],
                              'reference': sample['reference'],
                              'status': 'started',
                          }
                          result['evaluations'].append(row)
                          save(result)
                          try:
                              t0 = time.perf_counter()
                              pred = gen(prompt, MAX_NEW_TOKENS)
                              elapsed = time.perf_counter() - t0
                              f1 = token_f1(pred, sample['reference'])
                              hit = contains_answer(pred, sample['reference'])
                              row.update({'status': 'passed', 'elapsed_seconds': round(elapsed, 4), 'prediction': str(pred), 'token_f1': f1, 'contains_answer': hit})
                              scores.append(f1)
                              hits.append(1 if hit else 0)
                              log(f"PASS model={model_spec['label']} dataset={sample['dataset_id']} f1={f1} hit={hit} seconds={elapsed:.2f}")
                          except Exception as e:
                              row.update({'status': 'error', 'error': repr(e), 'traceback': traceback.format_exc()})
                              log(f"ERROR model={model_spec['label']} dataset={sample['dataset_id']} {e!r}")
                          save(result)
                      msum['status'] = 'finished'
                      msum['cases'] = len([r for r in result['evaluations'] if r.get('model_label') == model_spec['label']])
                      msum['avg_token_f1'] = round(statistics.mean(scores), 4) if scores else None
                      msum['contains_answer_rate'] = round(sum(hits) / len(hits), 4) if hits else None
                      save(result)
                      del gen
                      gc.collect()
                  except Exception as e:
                      msum['status'] = 'error'
                      msum['error'] = repr(e)
                      msum['traceback'] = traceback.format_exc()
                      log(f"MODEL_ERROR {model_spec['label']} {e!r}")
                      save(result)
              result['status'] = 'finished'
              save(result)
          except Exception as e:
              result['status'] = 'error'
              result['error'] = repr(e)
              result['traceback'] = traceback.format_exc()
              log('TOP_LEVEL_ERROR ' + repr(e))
              save(result)
          PY
          PYTHONUNBUFFERED=1 python eval_qwopus_qwen_datasets.py
          echo "python_exit=$?" | tee -a qwopus-qwen-dataset-eval.log
          exit 0

      - name: Upload dataset evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwopus-qwen-dataset-eval-results
          path: |
            qwopus-qwen-dataset-eval-results.md
            qwopus-qwen-dataset-eval-results.json
            qwopus-qwen-dataset-eval-results.csv
            qwopus-qwen-dataset-eval.log
          if-no-files-found: warn

      - name: Commit dataset evaluation results back to repo
        if: always()
        shell: bash
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qwopus-qwen-dataset-eval-results.md qwopus-qwen-dataset-eval-results.json qwopus-qwen-dataset-eval-results.csv qwopus-qwen-dataset-eval.log || true
          git commit -m "Write Qwopus vs Qwen dataset evaluation results [skip ci]" || echo "No dataset eval result changes to commit"
          git pull --rebase || true
          git push || echo "No dataset eval result push performed"

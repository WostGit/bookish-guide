name: Qwopus3.5 MLX Benchmark

'on':
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

concurrency:
  group: qwopus35-mlx-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: Benchmark Qwopus3.5 9B 4bit MLX
    runs-on: macos-26
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub psutil

      - name: Run benchmark
        shell: bash
        run: |
          set +e
          cat > qwopus35_mlx_benchmark.py <<'PY'
          import csv
          import inspect
          import json
          import os
          import platform
          import resource
          import signal
          import statistics
          import subprocess
          import sys
          import threading
          import time
          import traceback
          from pathlib import Path

          import psutil
          from huggingface_hub import HfApi

          MODEL_ID = 'Jackrong/MLX-Qwopus3.5-9B-v3-4bit'
          RESULT_MD = Path('qwopus35-9b-4bit-mlx-results.md')
          RESULT_JSON = Path('qwopus35-9b-4bit-mlx-results.json')
          RESULT_CSV = Path('qwopus35-9b-4bit-mlx-results.csv')
          LOG = Path('qwopus35-9b-4bit-mlx.log')
          SAMPLES = Path('qwopus35-9b-4bit-mlx-memory-samples.jsonl')

          process = psutil.Process(os.getpid())
          samples = []
          stop = threading.Event()
          start_mono = time.perf_counter()

          def sh(args):
              try:
                  return subprocess.check_output(args, text=True, stderr=subprocess.STDOUT).strip()
              except Exception as exc:
                  return f'unavailable: {exc}'

          def log(message):
              text = str(message)
              print(text, flush=True)
              with LOG.open('a', encoding='utf-8') as handle:
                  handle.write(text + '\n')

          def memory_sample(label):
              try:
                  info = process.memory_info()
                  vm = psutil.virtual_memory()
                  swap = psutil.swap_memory()
                  usage = resource.getrusage(resource.RUSAGE_SELF)
                  sample = {
                      'time': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
                      'elapsed_seconds': round(time.perf_counter() - start_mono, 3),
                      'label': label,
                      'rss_gib': round(info.rss / (1024 ** 3), 4),
                      'vms_gib': round(info.vms / (1024 ** 3), 4),
                      'max_rss': usage.ru_maxrss,
                      'threads': process.num_threads(),
                      'total_gib': round(vm.total / (1024 ** 3), 4),
                      'available_gib': round(vm.available / (1024 ** 3), 4),
                      'used_gib': round(vm.used / (1024 ** 3), 4),
                      'percent': vm.percent,
                      'swap_used_gib': round(swap.used / (1024 ** 3), 4),
                      'swap_percent': swap.percent,
                  }
                  samples.append(sample)
                  with SAMPLES.open('a', encoding='utf-8') as handle:
                      handle.write(json.dumps(sample) + '\n')
                  log('MEM ' + ' '.join(f'{key}={value}' for key, value in sample.items() if key != 'time'))
                  return sample
              except Exception as exc:
                  log(f'MEMORY_SAMPLE_ERROR label={label} error={exc!r}')
                  return None

          def monitor_loop():
              while not stop.is_set():
                  memory_sample('background_2s')
                  stop.wait(2)

          def encode_len(tokenizer, text):
              try:
                  return len(tokenizer.encode(text))
              except Exception:
                  return None

          def save_outputs(result):
              result['updated_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              result['memory_sample_count'] = len(samples)
              if samples:
                  result['peak_rss_gib'] = max(item['rss_gib'] for item in samples)
                  result['min_available_gib'] = min(item['available_gib'] for item in samples)
                  result['peak_swap_gib'] = max(item['swap_used_gib'] for item in samples)

              RESULT_JSON.write_text(json.dumps(result, indent=2) + '\n', encoding='utf-8')

              columns = [
                  'name', 'prompt_label', 'prompt_tokens', 'max_tokens', 'repeat',
                  'status', 'elapsed_seconds', 'requested_tps', 'output_tokens',
                  'error', 'output_preview'
              ]
              with RESULT_CSV.open('w', encoding='utf-8', newline='') as handle:
                  writer = csv.DictWriter(handle, fieldnames=columns)
                  writer.writeheader()
                  for case in result.get('cases', []):
                      writer.writerow({key: case.get(key, '') for key in columns})

              lines = [
                  '# Qwopus3.5 9B 4-bit MLX benchmark',
                  '',
                  f"Status: `{result.get('status')}`",
                  f"Model: `{MODEL_ID}`",
                  f"Started: `{result.get('started_at')}`",
                  f"Updated: `{result.get('updated_at')}`",
                  f"Runner: `{result.get('runner')} {result.get('runner_os')} {result.get('runner_arch')}`",
                  f"Platform: `{result.get('platform')}`",
                  f"GitHub SHA: `{result.get('github_sha')}`",
                  f"Model file GiB: `{result.get('model_file_gib')}`",
                  f"Load seconds: `{result.get('load_seconds')}`",
                  f"Peak RSS GiB: `{result.get('peak_rss_gib')}`",
                  f"Min available GiB: `{result.get('min_available_gib')}`",
                  f"Peak swap GiB: `{result.get('peak_swap_gib')}`",
                  '',
                  '## Cases',
                  '| Case | Prompt tokens | Max tokens | Repeat | Status | Seconds | tok/s | Output tokens |',
                  '|---|---:|---:|---:|---|---:|---:|---:|',
              ]
              for case in result.get('cases', []):
                  lines.append(
                      f"| {case.get('name')} | {case.get('prompt_tokens')} | {case.get('max_tokens')} | "
                      f"{case.get('repeat')} | {case.get('status')} | {case.get('elapsed_seconds')} | "
                      f"{case.get('requested_tps')} | {case.get('output_tokens')} |"
                  )
              passed = [case for case in result.get('cases', []) if case.get('status') == 'passed']
              if passed:
                  best = max(passed, key=lambda case: case.get('requested_tps') or 0)
                  lines.extend(['', '## Best case', '```json', json.dumps(best, indent=2), '```'])
              if result.get('error'):
                  lines.extend(['', '## Error', '```text', str(result.get('error')), str(result.get('traceback', '')), '```'])
              RESULT_MD.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          class CaseTimeout(Exception):
              pass

          def alarm_handler(signum, frame):
              raise CaseTimeout('case timed out')

          for path in [LOG, SAMPLES]:
              path.write_text('', encoding='utf-8')

          result = {
              'status': 'started',
              'model_id': MODEL_ID,
              'started_at': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'github_sha': os.environ.get('GITHUB_SHA'),
              'github_run_id': os.environ.get('GITHUB_RUN_ID'),
              'github_run_number': os.environ.get('GITHUB_RUN_NUMBER'),
              'runner': os.environ.get('RUNNER_NAME'),
              'runner_os': os.environ.get('RUNNER_OS'),
              'runner_arch': os.environ.get('RUNNER_ARCH'),
              'platform': platform.platform(),
              'python_version': sys.version.replace('\n', ' '),
              'macos_version': sh(['sw_vers']),
              'sysctl_hw': sh(['bash', '-lc', 'sysctl -n hw.memsize hw.ncpu hw.optional.arm64 2>/dev/null || true']),
              'cases': [],
          }
          save_outputs(result)

          monitor = threading.Thread(target=monitor_loop, daemon=True)
          monitor.start()

          try:
              log(f'Benchmarking {MODEL_ID}')
              log('sysctl_hw: ' + str(result['sysctl_hw']).replace('\n', ' | '))
              memory_sample('initial')

              info = HfApi().model_info(MODEL_ID, files_metadata=True)
              model_bytes = 0
              for sibling in getattr(info, 'siblings', []) or []:
                  name = getattr(sibling, 'rfilename', '') or ''
                  size = int(getattr(sibling, 'size', 0) or 0)
                  if name.endswith(('.safetensors', '.bin', '.npz')) or 'model' in name.lower() or name in {'config.json', 'tokenizer.json'}:
                      model_bytes += size
              result['model_file_bytes'] = model_bytes
              result['model_file_gib'] = round(model_bytes / (1024 ** 3), 4)
              result['hf_tags'] = getattr(info, 'tags', []) or []
              save_outputs(result)

              memory_sample('before_import_mlx')
              import mlx.core as mx
              from mlx_lm import generate, load
              memory_sample('after_import_mlx')

              load_kwargs = {}
              try:
                  if 'tokenizer_config' in inspect.signature(load).parameters:
                      load_kwargs['tokenizer_config'] = {'fix_mistral_regex': True}
              except Exception:
                  pass

              memory_sample('before_load')
              load_start = time.perf_counter()
              model, tokenizer = load(MODEL_ID, **load_kwargs)
              memory_sample('after_load_before_eval')
              mx.eval(model.parameters())
              memory_sample('after_eval')
              result['load_seconds'] = round(time.perf_counter() - load_start, 4)
              result['mlx_device'] = str(mx.default_device())
              result['status'] = 'loaded'
              save_outputs(result)

              prompts = {
                  'tiny': 'Hi.',
                  'short': 'Say OK and one brief reason this model is running.',
                  'medium': 'In one concise paragraph, explain whether a 5 GB quantized MLX model can run on a 7 GB GitHub Actions M1 runner.',
                  'long': 'Discuss memory pressure for local LLM inference: model weights, KV cache, prompt length, output length, swap, and slowdowns. Keep it concise.',
              }
              plan = [
                  ('warmup_1tok', 'tiny', 1, 1, 90),
                  ('tiny_2tok', 'tiny', 2, 2, 90),
                  ('short_8tok', 'short', 8, 2, 120),
                  ('short_16tok', 'short', 16, 1, 180),
                  ('medium_prefill_1tok', 'medium', 1, 1, 120),
                  ('medium_8tok', 'medium', 8, 1, 180),
              ]
              signal.signal(signal.SIGALRM, alarm_handler)
              for name, prompt_label, max_tokens, repeats, timeout_seconds in plan:
                  prompt = prompts[prompt_label]
                  prompt_tokens = encode_len(tokenizer, prompt)
                  for repeat in range(1, repeats + 1):
                      case = {
                          'name': name,
                          'prompt_label': prompt_label,
                          'prompt_tokens': prompt_tokens,
                          'max_tokens': max_tokens,
                          'repeat': repeat,
                          'status': 'started',
                      }
                      result['cases'].append(case)
                      save_outputs(result)
                      memory_sample(f'before_{name}_rep{repeat}')
                      try:
                          signal.alarm(timeout_seconds)
                          case_start = time.perf_counter()
                          output = generate(model, tokenizer, prompt=prompt, max_tokens=max_tokens, verbose=False)
                          elapsed = time.perf_counter() - case_start
                          signal.alarm(0)
                          memory_sample(f'after_{name}_rep{repeat}')
                          preview = str(output)[:400]
                          case.update({
                              'status': 'passed',
                              'elapsed_seconds': round(elapsed, 4),
                              'requested_tps': round(max_tokens / elapsed, 4) if elapsed > 0 else None,
                              'output_tokens': encode_len(tokenizer, str(output)),
                              'output_preview': preview,
                          })
                          log(f"CASE_PASS {name} repeat={repeat} seconds={case['elapsed_seconds']} tps={case['requested_tps']}")
                      except BaseException as exc:
                          signal.alarm(0)
                          memory_sample(f'error_{name}_rep{repeat}')
                          case.update({'status': 'error', 'error': repr(exc), 'traceback': traceback.format_exc()})
                          log(f'CASE_ERROR {name} repeat={repeat} error={exc!r}')
                      save_outputs(result)

              passed = [case for case in result['cases'] if case.get('status') == 'passed']
              result['passed_cases'] = len(passed)
              result['total_cases'] = len(result['cases'])
              result['status'] = 'finished'
              values = [case['requested_tps'] for case in passed if case.get('requested_tps') is not None]
              if values:
                  result['avg_requested_tps'] = round(statistics.mean(values), 4)
                  result['best_requested_tps'] = max(values)
              memory_sample('final')
              save_outputs(result)
          except BaseException as exc:
              result['status'] = 'error_or_interrupted'
              result['error'] = repr(exc)
              result['traceback'] = traceback.format_exc()
              log('TOP_LEVEL_ERROR ' + repr(exc))
              memory_sample('top_level_error')
              save_outputs(result)
          finally:
              stop.set()
              result['finished_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              memory_sample('finally')
              save_outputs(result)
              log('Wrote benchmark outputs')
          PY
          PYTHONUNBUFFERED=1 python qwopus35_mlx_benchmark.py
          echo "python_exit=$?" | tee -a qwopus35-9b-4bit-mlx.log
          exit 0

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qwopus35-mlx-benchmark-results
          path: |
            qwopus35-9b-4bit-mlx-results.md
            qwopus35-9b-4bit-mlx-results.json
            qwopus35-9b-4bit-mlx-results.csv
            qwopus35-9b-4bit-mlx.log
            qwopus35-9b-4bit-mlx-memory-samples.jsonl
          if-no-files-found: warn

      - name: Commit benchmark results back to repo
        if: always()
        shell: bash
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qwopus35-9b-4bit-mlx-results.md qwopus35-9b-4bit-mlx-results.json qwopus35-9b-4bit-mlx-results.csv qwopus35-9b-4bit-mlx.log qwopus35-9b-4bit-mlx-memory-samples.jsonl || true
          git commit -m "Write Qwopus3.5 MLX benchmark results [skip ci]" || echo "No benchmark result changes to commit"
          git pull --rebase || true
          git push || echo "No benchmark result push performed"
